<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" font-family="system-ui,Segoe UI,sans-serif">
  <rect width="900" height="900" fill="#eef1f6"/>
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#16223f">In-chat video recorder — layout fix (iPhone 390×844)</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b">Measured from the live DOM with the exact shipped Tailwind classes</text>

  <!-- ============ BEFORE ============ -->
  <g transform="translate(70,90)">
    <text x="195" y="-8" text-anchor="middle" font-size="15" font-weight="700" fill="#c0314d">BEFORE — w-full only (bug)</text>
    <!-- phone frame 390x844 scaled by 0.72 => 281 x 608 -->
    <rect x="0" y="0" width="281" height="608" rx="18" fill="#ffffff" stroke="#1b2a4a" stroke-width="2"/>
    <!-- header -->
    <rect x="0" y="0" width="281" height="34" rx="18" fill="#16223f"/>
    <rect x="0" y="16" width="281" height="18" fill="#16223f"/>
    <text x="14" y="22" font-size="11" fill="#fff">Chat · Hussain</text>
    <!-- oversized preview: 636px * 0.72 = 458, starts just under header -->
    <clipPath id="cbBefore"><rect x="0" y="34" width="281" height="574" rx="0"/></clipPath>
    <g clip-path="url(#cbBefore)">
      <rect x="8" y="42" width="265" height="458" rx="8" fill="url(#feed)"/>
      <text x="140" y="265" text-anchor="middle" font-size="13" fill="#ffffff" opacity="0.9">LIVE CAMERA (9:16)</text>
      <text x="140" y="285" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">renders 636px tall</text>
      <!-- Stop button pushed to y≈508, near/over the bottom edge -->
      <rect x="8" y="512" width="70" height="26" rx="6" fill="#c0314d"/>
      <text x="43" y="529" text-anchor="middle" font-size="11" fill="#fff">■ Stop</text>
    </g>
    <!-- red cross-out showing Stop is at/over the fold -->
    <line x1="0" y1="608" x2="281" y2="608" stroke="#c0314d" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="140" y="630" text-anchor="middle" font-size="11" fill="#c0314d" font-weight="600">Stop sits at the fold — pushed off on real scroll</text>
  </g>

  <!-- ============ AFTER ============ -->
  <g transform="translate(540,90)">
    <text x="140" y="-8" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">AFTER — max-h-[40vh] object-contain (fix)</text>
    <rect x="0" y="0" width="281" height="608" rx="18" fill="#ffffff" stroke="#1b2a4a" stroke-width="2"/>
    <!-- header -->
    <rect x="0" y="0" width="281" height="34" rx="18" fill="#16223f"/>
    <rect x="0" y="16" width="281" height="18" fill="#16223f"/>
    <text x="14" y="22" font-size="11" fill="#fff">Chat · Hussain</text>
    <!-- capped preview: 338px * 0.72 = 243 -->
    <rect x="8" y="42" width="265" height="243" rx="8" fill="url(#feed)"/>
    <text x="140" y="158" text-anchor="middle" font-size="13" fill="#ffffff" opacity="0.9">LIVE CAMERA (9:16)</text>
    <text x="140" y="178" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.7">capped at 338px (40vh)</text>
    <!-- Stop row -->
    <rect x="8" y="295" width="70" height="26" rx="6" fill="#c0314d"/>
    <text x="43" y="312" text-anchor="middle" font-size="11" fill="#fff">■ Stop</text>
    <text x="92" y="312" font-size="11" fill="#c0314d">0:07 / 3:00</text>
    <!-- composer send row near bottom, fully visible -->
    <line x1="8" y1="556" x2="273" y2="556" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="8" y="566" width="26" height="26" rx="6" fill="#eef1f6"/>
    <rect x="40" y="566" width="26" height="26" rx="6" fill="#fde7ec"/>
    <rect x="72" y="566" width="26" height="26" rx="6" fill="#eef1f6"/>
    <rect x="104" y="566" width="130" height="26" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="240" y="566" width="26" height="26" rx="6" fill="#16223f"/>
    <text x="253" y="583" text-anchor="middle" font-size="11" fill="#fff">➤</text>
    <text x="140" y="630" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">Preview + Stop + Send all visible ✓</text>
  </g>

  <!-- gradient stand-in for the portrait camera feed -->
  <defs>
    <linearGradient id="feed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2d4d"/>
      <stop offset="0.5" stop-color="#2b3a5c"/>
      <stop offset="1" stop-color="#8a2c4d"/>
    </linearGradient>
  </defs>

  <!-- measured-numbers footnote -->
  <g transform="translate(70,742)">
    <rect x="0" y="0" width="751" height="118" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="16" y="26" font-size="13" font-weight="700" fill="#16223f">Live DOM measurements @ 390×844 (exact shipped classes):</text>
    <text x="16" y="50" font-size="12.5" fill="#c0314d">• WITHOUT cap (old): preview = 636px tall → bottom 964px (overflows by 120px), Stop NOT visible</text>
    <text x="16" y="72" font-size="12.5" fill="#16a34a">• WITH cap (shipped): preview = 338px (40vh) → Stop visible, send row bottom = 832px ≤ 844 viewport</text>
    <text x="16" y="98" font-size="11.5" fill="#64748b">Same caps applied to the assignments attachment-composer twin recorder; recorder panel is now max-h-[55vh] + scrollable.</text>
  </g>
</svg>
