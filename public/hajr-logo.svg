<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <style>
    .navy { fill: #1E2A36; }
    .rose { fill: #B86E7B; }
    .word { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 800; letter-spacing: -0.04em; }
  </style>
  <!-- HAJR wordmark — extrabold, condensed -->
  <text x="0" y="80" class="navy word" font-size="92" textLength="200" lengthAdjust="spacingAndGlyphs">HAJR</text>
  <!-- Tiny rose A° — same extrabold weight, baseline-aligned to HAJR -->
  <text x="220" y="80" class="rose word" font-size="34">A</text>
  <text x="246" y="60" class="rose word" font-size="22">°</text>
</svg>
