<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#D4C5E2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FAF6EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="95%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#B5E5D8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FAF6EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#FAF6EE"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- HAJR | A° lockup -->
  <g transform="translate(600, 250)">
    <text x="-130" y="0" text-anchor="end" font-family="Inter, Helvetica, sans-serif" font-weight="800" font-size="150" letter-spacing="-7" fill="#2C3E50">HAJR</text>
    <rect x="-104" y="-118" width="6" height="150" fill="#C97B8A"/>
    <text x="-72" y="0" font-family="Inter, Helvetica, sans-serif" font-weight="600" font-size="118" letter-spacing="-3" fill="#C97B8A">A</text>
    <circle cx="30" cy="-92" r="13" fill="none" stroke="#C97B8A" stroke-width="7"/>
  </g>

  <!-- caption -->
  <text x="600" y="330" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-weight="500" font-size="34" letter-spacing="16" fill="#8A8580">A C A D E M Y</text>

  <!-- tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-weight="700" font-size="40" fill="#2C3E50">Premium English Education for Saudi Arabia</text>

  <!-- accent dots -->
  <g transform="translate(600, 478)">
    <circle cx="-32" cy="0" r="8" fill="#C97B8A"/>
    <circle cx="0" cy="0" r="8" fill="#B5E5D8"/>
    <circle cx="32" cy="0" r="8" fill="#D4C5E2"/>
  </g>
