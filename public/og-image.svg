<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- HAJR A° Academy — OG card, brand v3.
       Ivory canvas, centered HAJR A° lockup, charcoal tagline,
       bottom-right ghosted A° at 8% opacity. -->
  <rect width="1200" height="630" fill="#FAF6EE"/>

  <!-- Decorative giant ghosted A° in the bottom-right corner -->
  <g transform="translate(900, 360)" opacity="0.08">
    <text x="0" y="220" font-family="Inter, Helvetica, sans-serif" font-weight="800" font-size="460" letter-spacing="-20" fill="#1E2A36">A</text>
    <circle cx="290" cy="80" r="46" fill="none" stroke="#B86E7B" stroke-width="24"/>
  </g>

  <!-- HAJR | A° lockup -->
  <g transform="translate(600, 260)">
    <text x="-130" y="0" text-anchor="end" font-family="Inter, Helvetica, sans-serif" font-weight="800" font-size="150" letter-spacing="-7" fill="#1E2A36">HAJR</text>
    <rect x="-104" y="-118" width="6" height="150" fill="#B86E7B"/>
    <text x="-72" y="0" font-family="Inter, Helvetica, sans-serif" font-weight="600" font-size="118" letter-spacing="-3" fill="#1E2A36">A</text>
    <circle cx="30" cy="-92" r="13" fill="none" stroke="#B86E7B" stroke-width="7"/>
  </g>

  <!-- ACADEMY caption -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-weight="500" font-size="32" letter-spacing="16" fill="#64748B">A C A D E M Y</text>

  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="Inter, Helvetica, sans-serif" font-weight="700" font-size="36" fill="#2C3E50">Learn with Confidence · تعلّم بثقة</text>

  <!-- 3 accent dots — rose, mint, charcoal -->
  <g transform="translate(600, 488)">
    <circle cx="-32" cy="0" r="7" fill="#B86E7B"/>
    <circle cx="0" cy="0" r="7" fill="#B5E5D8"/>
    <circle cx="32" cy="0" r="7" fill="#1E2A36"/>
  </g>
</svg>
