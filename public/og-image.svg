<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- HAJR A° Academy — OG card, brand v3 canonical.
       Ivory canvas, centered HAJR (Bold 700) + A° (Light 300, mauve),
       muted ACADEMY caption, ghosted A° at 3% opacity bottom-right. -->
  <style>
    .font { font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif; }
  </style>

  <rect width="1200" height="630" fill="#FAF6EE"/>

  <!-- Ghosted oversized A° watermark, bottom-right, 3% opacity -->
  <g opacity="0.03">
    <text
      x="1100"
      y="610"
      text-anchor="end"
      class="font"
      font-weight="300"
      font-size="540"
      letter-spacing="-10"
      fill="#1E2A36"
    >A°</text>
  </g>

  <!-- Centered HAJR + small mauve A° lockup, baseline-aligned -->
  <g transform="translate(600, 270)">
    <text x="-200" y="0" text-anchor="end" class="font" font-weight="700" font-size="160" letter-spacing="-3.2" fill="#1E2A36">HAJR</text>
    <text x="-184" y="0" class="font" font-weight="300" font-size="64" letter-spacing="-1.3" fill="#B86E7B">A°</text>
  </g>

  <!-- ACADEMY caption, muted -->
  <text x="600" y="340" text-anchor="middle" class="font" font-weight="400" font-size="22" letter-spacing="13" opacity="0.7" fill="#1E2A36">ACADEMY</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" class="font" font-weight="400" font-size="28" letter-spacing="0.5" fill="#2C3E50">Premium English Education · Al Ahsa, Saudi Arabia</text>
</svg>
