<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- HAJR A° favicon — brand v3 canonical.
       Navy rounded tile, mauve A° in light weight (300). -->
  <rect width="64" height="64" rx="14" fill="#1E2A36"/>
  <!-- A° as a single text glyph at font-weight 300 so the proportion
       between A and ° is correct without manual circle approximation. -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="300"
    font-size="38"
    letter-spacing="-1"
    fill="#B86E7B"
  >A°</text>
</svg>
